<!DOCTYPE html>
<html>
<head>
    <title>Input Form</title>
    <link rel="shortcut icon" href="#">
</head>
<body>
    <h1>Input Form</h1>
    <form method="post" action="/process">
        <label for="input_values">Paste your list of values:</label><br>
        <textarea id="input_values" name="input_values" rows="5" cols="50"></textarea><br>
        <input type="submit" value="Submit">
    </form>
    
    {% if parsed_values %}
    <h2>Parsed Values:</h2>
    <ul>
        {% for value in parsed_values %}
        <li>{{ value }}</li>
        {% endfor %}
    </ul>
    {% endif %}
</body>
</html>
